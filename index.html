<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Login</title><link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'><link href='https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css' rel='stylesheet'><link rel='stylesheet' href='styles.css'></head>
<body class='d-flex align-items-center justify-content-center page-fade'><div class='card glass p-4 fade-up' style='max-width:420px;width:100%'><div class='text-center mb-3'><i class='bi bi-lightning-charge-fill text-primary display-4 logo-float'></i><h4 class='mt-2'>SENTHIL ELECTRICALS</h4></div><div id='alert'></div><form id='loginForm'><div class='mb-3'><label>Username</label><input class='form-control input-glow' id='u' required></div><div class='mb-3'><label>Password</label><div class='input-group'><input class='form-control input-glow' type='password' id='p' required><button type='button' class='btn btn-outline-secondary' id='toggle'><i class='bi bi-eye'></i></button></div></div><button class='btn btn-primary w-100 btn-ripple hover-lift'>Login</button></form><button class='btn btn-sm btn-outline-dark mt-3 w-100 theme-toggle'>Dark/Light</button><p class='text-center mt-3 small'>© 2026 Senthil Electricals</p></div>
<script src='app.js'></script><script>if(auth.check())location='dashboard.html';toggle.onclick=()=>{p.type=p.type==='password'?'text':'password'};loginForm.onsubmit=e=>{e.preventDefault();if(auth.login(u.value,p.value)){store.set('session',true);toast('Login successful');location='dashboard.html'}else{alert.innerHTML=`<div class='alert alert-danger'>Invalid credentials.</div>`}}</script></body></html>
