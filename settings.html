<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Settings</title><link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'><link rel='stylesheet' href='styles.css'></head><body class='page-fade'><div class='container py-4'><a href='dashboard.html' class='btn btn-outline-primary mb-3'>Back</a><div class='card glass p-4 fade-up'><h4>Billing Preferences</h4><div class='form-check form-switch fs-5'><input class='form-check-input' type='checkbox' id='tax'><label class='form-check-label'>Tax Calculation <span id='st' class='badge bg-secondary'></span></label></div></div><div class='card mt-3 p-3'><h6>Coming Soon</h6><span class='badge bg-info me-2'>Currency Settings</span><span class='badge bg-info me-2'>Invoice Prefix</span><span class='badge bg-info'>Theme Preferences</span></div></div><script src='app.js'></script><script>const s=settingsAPI.get();tax.checked=s.taxEnabled;const upd=()=>{st.textContent=tax.checked?'Enabled':'Disabled';st.className='badge '+(tax.checked?'bg-success':'bg-danger')};upd();tax.onchange=()=>{settingsAPI.set({taxEnabled:tax.checked});upd();toast('Settings saved')};</script></body></html>
