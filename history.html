<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>History</title><link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'><link rel='stylesheet' href='styles.css'></head><body class='page-fade'><div class='container py-3'><a href='dashboard.html' class='btn btn-outline-primary mb-2'>Back</a><h3>Billing History</h3><div class='row g-2 mb-2'><div class='col-md-8'><input id='s' class='form-control input-glow' placeholder='Search invoice/customer'></div><div class='col-md-4'><input id='d' type='date' class='form-control input-glow'></div></div><div class='table-responsive'><table class='table table-hover'><thead><tr><th>Invoice</th><th>Customer</th><th>Date</th><th>Total</th><th>Status</th><th>Action</th></tr></thead><tbody id='t'></tbody></table></div><div id='e' class='text-center text-muted py-5 d-none'>No invoices found.</div></div><script src='app.js'></script><script>const render=()=>{let b=billsAPI.all();if(s.value)b=b.filter(x=>(x.invoiceNo+x.customerName).toLowerCase().includes(s.value.toLowerCase()));if(d.value)b=b.filter(x=>new Date(x.date).toDateString()===new Date(d.value).toDateString());e.classList.toggle('d-none',b.length>0);t.innerHTML=b.map((x,i)=>`<tr class='fade-up'><td>${x.invoiceNo}</td><td>${x.customerName}</td><td>${x.date}</td><td>₹${x.grandTotal}</td><td><span class='badge bg-success'>${x.status}</span></td><td><button class='btn btn-sm btn-primary' onclick='view(${i})'>View</button> <button class='btn btn-sm btn-danger' onclick='del(${i})'>Delete</button></td></tr>`).join('')};const view=i=>{store.set('latestInvoice',billsAPI.all()[i]);location='invoice.html'};const del=i=>{if(confirm('Delete invoice?')){const a=billsAPI.all();a.splice(i,1);billsAPI.save(a);render()}};s.oninput=render;d.onchange=render;render();</script></body></html>
