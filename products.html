<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Products</title><link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'><link href='https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css' rel='stylesheet'><link rel='stylesheet' href='styles.css'></head><body class='page-fade'><div class='container py-3'><div class='d-flex justify-content-between mb-3'><h3>Product Management</h3><div><a href='dashboard.html' class='btn btn-outline-primary'>Dashboard</a><button class='btn btn-primary' data-bs-toggle='modal' data-bs-target='#m'>Add Product</button></div></div><input id='search' class='form-control mb-3 input-glow' placeholder='Search product...'><div class='table-responsive'><table class='table table-hover'><thead><tr><th>ID</th><th>Name</th><th>Category</th><th>Price</th><th>Qty</th><th>Status</th><th>Action</th></tr></thead><tbody id='tb'></tbody></table></div><div id='empty' class='text-center text-muted py-5 d-none'><i class='bi bi-inboxes display-5 d-block logo-float'></i>No products yet.</div></div>
<div class='modal fade' id='m'><div class='modal-dialog'><form class='modal-content' id='f'><div class='modal-header'><h5 class='modal-title'>Product</h5><button class='btn-close' data-bs-dismiss='modal'></button></div><div class='modal-body'><input id='pid' class='form-control mb-2' placeholder='Product ID' required><input id='pn' class='form-control mb-2' placeholder='Name' required><input id='pc' class='form-control mb-2' placeholder='Category' required><input id='pp' type='number' class='form-control mb-2' placeholder='Price' required><input id='pq' type='number' class='form-control mb-2' placeholder='Quantity' required></div><div class='modal-footer'><button class='btn btn-primary'>Save</button></div></form></div></div>
<script src='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js'></script><script src='app.js'></script><script>let edit=-1;const modal=new bootstrap.Modal(m);const render=()=>{const q=search.value.toLowerCase();let d=productsAPI.all().filter(x=>Object.values(x).join(' ').toLowerCase().includes(q));empty.classList.toggle('d-none',d.length>0);tb.innerHTML=d.map((p,i)=>`<tr class='fade-up'><td>${p.id}</td><td>${p.name}</td><td>${p.category}</td><td>${p.price}</td><td>${p.qty}</td><td><span class='badge bg-${p.qty>0?'success':'danger'}'>${p.qty>0?'In Stock':'Out of Stock'}</span></td><td><button class='btn btn-sm btn-warning' onclick='ed(${i})'>Edit</button> <button class='btn btn-sm btn-danger' onclick='del(${i})'>Delete</button></td></tr>`).join('')};
const ed=i=>{const p=productsAPI.all().filter(x=>Object.values(x).join(' ').toLowerCase().includes(search.value.toLowerCase()))[i];edit=productsAPI.all().findIndex(x=>x.id===p.id);pid.value=p.id;pn.value=p.name;pc.value=p.category;pp.value=p.price;pq.value=p.qty;modal.show()};
const del=i=>{if(confirm('Delete product?')){let all=productsAPI.all();const p=all.filter(x=>Object.values(x).join(' ').toLowerCase().includes(search.value.toLowerCase()))[i];all=all.filter(x=>x.id!==p.id);productsAPI.save(all);toast('Deleted','danger');render()}}
f.onsubmit=e=>{e.preventDefault();const obj={id:pid.value,name:pn.value,category:pc.value,price:+pp.value,qty:+pq.value};let all=productsAPI.all();if(edit>-1)all[edit]=obj;else all.push(obj);productsAPI.save(all);edit=-1;f.reset();modal.hide();toast('Saved');render()};search.oninput=render;render();</script></body></html>
