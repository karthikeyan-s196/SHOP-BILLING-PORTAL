<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Dashboard</title><link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'><link href='https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css' rel='stylesheet'><link rel='stylesheet' href='styles.css'></head><body class='page-fade'><div class='container-fluid'><div class='row'><aside class='col-lg-2 bg-primary text-white p-3 sidebar' id='sb'><h5>Senthil</h5><nav class='nav flex-column gap-1'><a class='nav-link text-white' href='dashboard.html'>Dashboard</a><a class='nav-link text-white' href='products.html'>Products</a><a class='nav-link text-white' href='billing.html'>Create Bill</a><a class='nav-link text-white' href='history.html'>Billing History</a><a class='nav-link text-white' href='settings.html'>Settings</a><a class='nav-link text-white' href='#' onclick='auth.logout()'>Logout</a></nav></aside><main class='col-lg-10 ms-auto p-0'><nav class='navbar bg-white sticky-top-nav shadow-sm px-3'><button class='btn btn-outline-primary d-lg-none' onclick='sb.classList.toggle("show")'><i class='bi bi-list'></i></button><span class='navbar-brand'>Admin Dashboard</span><div><button class='btn btn-sm btn-outline-dark theme-toggle'>Theme</button></div></nav><div class='p-3'><div class='card glass p-3 mb-3 fade-up'><h4>Welcome, SENTHIL ELECTRICALS</h4><div class='d-flex gap-2'><a class='btn btn-primary btn-ripple' href='billing.html'>Create Bill</a><a class='btn btn-success btn-ripple' href='products.html'>Add Product</a></div></div><div class='row g-3'> <div class='col-md-4'><div class='card p-3 hover-lift'><small>Total Products</small><div id='c1' class='counter'>0</div></div></div><div class='col-md-4'><div class='card p-3 hover-lift'><small>Total Bills</small><div id='c2' class='counter'>0</div></div></div><div class='col-md-4'><div class='card p-3 hover-lift'><small>Total Revenue</small><div id='c3' class='counter'>0</div></div></div></div><div class='card mt-3 p-3'><h6>Recent Billing Activity</h6><div class='table-responsive'><table class='table table-hover'><thead><tr><th>Invoice</th><th>Customer</th><th>Date</th><th>Total</th></tr></thead><tbody id='recent'></tbody></table></div></div></div></main></div></div><script src='app.js'></script><script>const bills=billsAPI.all(),products=productsAPI.all();animateCounter(c1,products.length);animateCounter(c2,bills.length);animateCounter(c3,bills.reduce((a,b)=>a+b.grandTotal,0));recent.innerHTML=bills.slice(-5).reverse().map(b=>`<tr class='fade-up'><td>${b.invoiceNo}</td><td>${b.customerName}</td><td>${b.date}</td><td>₹${b.grandTotal}</td></tr>`).join('')||`<tr><td colspan='4' class='text-center text-muted'>No billing activity yet.</td></tr>`;</script></body></html>
