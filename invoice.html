<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Invoice</title><link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'><link rel='stylesheet' href='styles.css'></head><body class='page-fade'><div class='container py-3'><div class='d-flex gap-2 mb-2 no-print'><a href='history.html' class='btn btn-outline-primary'>History</a><button class='btn btn-primary hover-lift' onclick='window.print()'>Print</button><button class='btn btn-success hover-lift' onclick='window.print()'>Download PDF</button></div><div class='card p-4 glass fade-up'><h3 class='text-primary'>SENTHIL ELECTRICALS</h3><p>Contact: +91-0000000000</p><h4>INVOICE</h4><div id='meta'></div><table class='table'><thead><tr><th>Product</th><th>Price</th><th>Qty</th><th>Total</th></tr></thead><tbody id='it'></tbody></table><div class='text-end'><p>Subtotal: ₹<span id='s'></span></p><p>Tax: ₹<span id='tx'></span></p><h5>Grand Total: ₹<span id='g'></span></h5></div><p class='small text-muted mt-3'>Thank you for your business.</p></div></div><script src='app.js'></script><script>const b=store.get('latestInvoice',null);if(!b){location='history.html'}meta.innerHTML=`<b>Invoice:</b> ${b.invoiceNo}<br><b>Date:</b> ${b.date}<br><b>Customer:</b> ${b.customerName} (${b.phone||''})`;it.innerHTML=b.items.map(i=>`<tr><td>${i.product}</td><td>${i.price}</td><td>${i.qty}</td><td>${i.total}</td></tr>`).join('');s.textContent=b.subtotal;tx.textContent=b.tax;g.textContent=b.grandTotal;</script></body></html>
