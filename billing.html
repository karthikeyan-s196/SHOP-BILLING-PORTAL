<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Create Bill</title><link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'><link rel='stylesheet' href='styles.css'></head><body class='page-fade'><div class='container py-3'><a href='dashboard.html' class='btn btn-outline-primary mb-2'>Back</a><h3>Create Invoice</h3><div class='row g-3'><div class='col-lg-8'><div class='card p-3'><div class='row g-2'><div class='col-md-6'><input id='cn' class='form-control' placeholder='Customer Name'></div><div class='col-md-6'><input id='cp' class='form-control' placeholder='Customer Phone'></div></div><div class='mt-2'>Invoice #: <b id='inv'></b> | Date: <b id='dt'></b></div><table class='table mt-3'><thead><tr><th>Product</th><th>Price</th><th>Qty</th><th>Total</th><th></th></tr></thead><tbody id='rows'></tbody></table><button class='btn btn-sm btn-primary' onclick='addRow()'>+ Add Row</button></div></div><div class='col-lg-4'><div class='card p-3 sticky-totals'><p>Subtotal: ₹<span id='sub'>0</span></p><p>Tax: ₹<span id='tax'>0</span></p><h5>Grand Total: ₹<span id='gt'>0</span></h5><button class='btn btn-success w-100' onclick='saveBill()'>Save Invoice</button></div></div></div></div><script src='app.js'></script><script>inv.textContent='INV'+Date.now().toString().slice(-6);dt.textContent=new Date().toLocaleDateString();const pro=productsAPI.all();const opts=pro.map(p=>`<option value='${p.id}'>${p.name}</option>`).join('');const addRow=()=>{rows.insertAdjacentHTML('beforeend',`<tr class='fade-up'><td><select class='form-select psel'>${opts}</select></td><td><input class='form-control price' type='number' readonly></td><td><input class='form-control qty' type='number' value='1' min='1'></td><td class='itotal'>0</td><td><button class='btn btn-sm btn-danger' onclick='this.closest("tr").remove();calc()'>x</button></td></tr>`);bind();calc()};const bind=()=>document.querySelectorAll('#rows tr').forEach(r=>{r.querySelector('.psel').onchange=()=>{const p=pro.find(x=>x.id===r.querySelector('.psel').value);r.querySelector('.price').value=p?.price||0;calc()};r.querySelector('.qty').oninput=calc;r.querySelector('.psel').dispatchEvent(new Event('change'))});const calc=()=>{let subtotal=0;document.querySelectorAll('#rows tr').forEach(r=>{const t=(+r.querySelector('.price').value)*(+r.querySelector('.qty').value);r.querySelector('.itotal').textContent=t.toFixed(2);subtotal+=t});const taxEnabled=settingsAPI.get().taxEnabled;const taxv=taxEnabled?subtotal*0.18:0;sub.textContent=subtotal.toFixed(2);tax.textContent=taxv.toFixed(2);gt.textContent=(subtotal+taxv).toFixed(2)};const saveBill=()=>{const b={invoiceNo:inv.textContent,date:dt.textContent,customerName:cn.value,phone:cp.value,items:[...document.querySelectorAll('#rows tr')].map(r=>({product:r.querySelector('.psel').value,price:+r.querySelector('.price').value,qty:+r.querySelector('.qty').value,total:+r.querySelector('.itotal').textContent})),subtotal:+sub.textContent,tax:+tax.textContent,grandTotal:+gt.textContent,status:'Paid'};const all=billsAPI.all();all.push(b);billsAPI.save(all);store.set('latestInvoice',b);toast('Invoice saved');location='invoice.html'};addRow();</script></body></html>
